<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DailyFlow — Plan your day</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%228%22 fill=%22%231D2B63%22/><circle cx=%2216%22 cy=%2216%22 r=%226%22 fill=%22%23D9B362%22/></svg>">
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/app.css" />
</head>
<body>

<a class="back-link" href="index.html">← DailyFlow</a>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="brand"><span class="dot"></span><span>DailyFlow</span></div>
    <h1>Welcome back</h1>
    <p id="loginSubtitle">Sign in to plan your day</p>

    <div class="field">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn btn-primary" id="submitAuthBtn">Sign In</button>
    <button class="btn btn-google" id="googleBtn">🔵 Continue with Google</button>

    <div id="authError"></div>

    <div class="switch-mode">
      <span id="switchText">Don't have an account?</span>
      <a id="switchLink">Sign up</a>
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <header>
    <div class="brand"><span class="dot"></span><span>DailyFlow</span></div>
    <div class="date" id="todayLabel">This Week</div>
    <div class="actions">
      <button class="icon-btn" id="exportPdfBtn" aria-label="Export week as PDF">⤓</button>
      <button class="icon-btn" id="darkToggle" aria-label="Toggle dark mode">🌙</button>
      <button class="icon-btn" id="logoutBtn" aria-label="Sign out">⎋</button>
    </div>
  </header>

  <main class="week-main">
    <section class="tray-shelf">
      <h3>Unscheduled</h3>
      <div class="tray" id="tray"></div>
      <button class="add-item-btn" id="addItemBtn">+ New Item</button>
    </section>

    <h1 class="print-title">DailyFlow — This Week</h1>
    <div class="week-grid" id="weekGrid"></div>
  </main>
</div>

<!-- New / Edit Item Modal -->
<div class="overlay" id="itemModal">
  <div class="modal">
    <h2 id="itemModalTitle">New Item</h2>
    <div class="field">
      <label>Name</label>
      <input id="itemTitle" placeholder="Deep work session" />
    </div>
    <div class="row2">
      <div class="field">
        <label>Duration (minutes)</label>
        <input type="number" id="itemDuration" value="30" min="5" step="5" />
      </div>
      <div class="field">
        <label>Color</label>
        <input type="color" id="itemColor" value="#465E95" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="itemCancel">Cancel</button>
      <button class="btn btn-primary" id="itemSave">Save</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
